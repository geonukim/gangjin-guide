<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 — 강진 여행 가이드 관리자</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green  : #2B3D2C;
    --green-l: #4A6B4C;
    --green-t: #EBF1E8;
    --cream  : #FAF8F4;
    --stone  : #F0EDE8;
    --border : #E5DDD5;
    --text   : #1C1814;
    --muted  : #9C8B78;
    --radius : 12px;
  }

  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 레이아웃 ── */
  .layout { display: flex; min-height: 100vh; }

  /* ── 사이드바 ── */
  .sidebar {
    width: 220px;
    background: var(--green);
    color: #fff;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
  }

  .sidebar-brand {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar-brand h1 {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.2px;
    line-height: 1.4;
  }

  .sidebar-brand p {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    margin-top: 3px;
  }

  .sidebar-nav { padding: 12px 0; flex: 1; }

  .nav-section {
    padding: 8px 20px 4px;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    border-radius: 0;
    transition: background 0.15s, color 0.15s;
    cursor: pointer;
  }

  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 500; }

  .nav-item svg {
    width: 16px; height: 16px;
    fill: none; stroke: currentColor;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  .sidebar-bottom {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .btn-logout {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.15); color: #fff; }

  /* ── 메인 콘텐츠 ── */
  .main { margin-left: 220px; flex: 1; }

  .topbar {
    height: 56px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .btn-primary {
    height: 34px;
    padding: 0 16px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--green-l); }
  .btn-primary svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }

  .content { padding: 28px; }

  /* ── 통계 카드 ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .stat-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--green-t);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    font-size: 18px;
  }

  /* ── 섹션 ── */
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .section-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .section-link {
    font-size: 12px;
    color: var(--green-l);
    text-decoration: none;
    font-weight: 500;
  }

  /* ── 최근 콘텐츠 목록 ── */
  .content-list { }

  .content-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .content-item:last-child { border-bottom: none; }
  .content-item:hover { background: var(--cream); }

  .content-thumb {
    width: 44px; height: 44px;
    border-radius: 8px;
    background: var(--stone);
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .content-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .content-info { flex: 1; min-width: 0; }

  .content-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .content-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .badge-published { background: var(--green-t); color: var(--green-l); }
  .badge-draft     { background: var(--stone);   color: var(--muted); }
  .badge-hidden    { background: #FEF3E2; color: #D97706; }

  /* ── 빠른 등록 ── */
  .quick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 20px;
  }

  .quick-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 20px 12px;
    border-radius: 10px;
    border: 1.5px dashed var(--border);
    background: var(--cream);
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .quick-btn:hover { border-color: var(--green-l); background: var(--green-t); }

  .quick-btn-icon { font-size: 24px; }
  .quick-btn-label { font-size: 12px; font-weight: 500; color: var(--text); }
  .quick-btn-sub   { font-size: 10px; color: var(--muted); text-align: center; }

  /* ── 로딩 ── */
  .skeleton {
    background: linear-gradient(90deg, var(--stone) 25%, var(--border) 50%, var(--stone) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .loading-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="layout">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>강진 여행 가이드</h1>
      <p>관리자 페이지</p>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">메뉴</div>
      <a href="dashboard.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        대시보드
      </a>
      <a href="content-list.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        콘텐츠 관리
      </a>
      <a href="collection-list.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
        컬렉션 관리
      </a>

      <div class="nav-section" style="margin-top:8px;">설정</div>
      <a href="settings.html" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        사이트 설정
      </a>
    </nav>

    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="Auth.logout()">로그아웃</button>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title">대시보드</div>
      <div class="topbar-right">
        <a href="content-edit.html" class="btn-primary">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          새 콘텐츠 등록
        </a>
      </div>
    </div>

    <div class="content">

      <!-- 통계 -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-icon">🍽️</div>
          <div class="stat-label">식당</div>
          <div class="stat-value" id="countRestaurant">-</div>
          <div class="stat-sub">등록된 식당</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">☕</div>
          <div class="stat-label">카페</div>
          <div class="stat-value" id="countCafe">-</div>
          <div class="stat-sub">등록된 카페</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🌿</div>
          <div class="stat-label">여행지</div>
          <div class="stat-value" id="countSpot">-</div>
          <div class="stat-sub">등록된 여행지</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🗺️</div>
          <div class="stat-label">컬렉션</div>
          <div class="stat-value" id="countCollection">-</div>
          <div class="stat-sub">추천코스 · 상황별</div>
        </div>
      </div>

      <!-- 섹션 그리드 -->
      <div class="section-grid">

        <!-- 최근 콘텐츠 -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">최근 등록 콘텐츠</div>
            <a href="content-list.html" class="section-link">전체 보기 →</a>
          </div>
          <div class="content-list" id="recentList">
            <!-- 로딩 스켈레톤 -->
            <div class="loading-row">
              <div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0;"></div>
              <div style="flex:1;">
                <div class="skeleton" style="height:13px;width:60%;margin-bottom:6px;"></div>
                <div class="skeleton" style="height:11px;width:40%;"></div>
              </div>
            </div>
            <div class="loading-row">
              <div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0;"></div>
              <div style="flex:1;">
                <div class="skeleton" style="height:13px;width:70%;margin-bottom:6px;"></div>
                <div class="skeleton" style="height:11px;width:45%;"></div>
              </div>
            </div>
            <div class="loading-row" style="border-bottom:none;">
              <div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0;"></div>
              <div style="flex:1;">
                <div class="skeleton" style="height:13px;width:55%;margin-bottom:6px;"></div>
                <div class="skeleton" style="height:11px;width:35%;"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 빠른 등록 -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">빠른 등록</div>
          </div>
          <div class="quick-grid">
            <a href="content-edit.html?type=place&cat=cat_001" class="quick-btn">
              <div class="quick-btn-icon">🍽️</div>
              <div class="quick-btn-label">식당 등록</div>
              <div class="quick-btn-sub">식당 정보 추가</div>
            </a>
            <a href="content-edit.html?type=place&cat=cat_002" class="quick-btn">
              <div class="quick-btn-icon">☕</div>
              <div class="quick-btn-label">카페 등록</div>
              <div class="quick-btn-sub">카페 정보 추가</div>
            </a>
            <a href="content-edit.html?type=place&cat=cat_003" class="quick-btn">
              <div class="quick-btn-icon">🌿</div>
              <div class="quick-btn-label">여행지 등록</div>
              <div class="quick-btn-sub">관광지 정보 추가</div>
            </a>
            <a href="collection-edit.html" class="quick-btn">
              <div class="quick-btn-icon">🗺️</div>
              <div class="quick-btn-label">코스 등록</div>
              <div class="quick-btn-sub">추천코스 만들기</div>
            </a>
          </div>
        </div>

      </div>
    </div>
  </main>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  // 로그인 확인
  Auth.require();

  // 카테고리 ID → 이름 매핑
  const CAT_NAME = {
    cat_001: '식당', cat_002: '카페',
    cat_003: '여행지', cat_004: '추천코스',
  };

  const STATUS_LABEL = {
    published: { text: '공개',   cls: 'badge-published' },
    draft    : { text: '임시저장', cls: 'badge-draft' },
    hidden   : { text: '숨김',   cls: 'badge-hidden' },
  };

  async function loadDashboard() {
    try {
      const [contentsRes, collectionsRes] = await Promise.all([
        API.adminGetAll(),
        API.getCollections(),
      ]);

      const contents    = contentsRes.data?.contents || [];
      const collections = collectionsRes.data || [];

      // 통계
      const count = (catId) => contents.filter(c => c.CategoryID === catId).length;
      document.getElementById('countRestaurant').textContent = count('cat_001');
      document.getElementById('countCafe').textContent       = count('cat_002');
      document.getElementById('countSpot').textContent       = count('cat_003');
      document.getElementById('countCollection').textContent = collections.length;

      // 최근 콘텐츠 (최신 5개)
      const recent = [...contents]
        .sort((a, b) => new Date(b.CreatedAt) - new Date(a.CreatedAt))
        .slice(0, 5);

      const images = contentsRes.data?.images || [];

      const listEl = document.getElementById('recentList');
      if (recent.length === 0) {
        listEl.innerHTML = `
          <div style="padding:32px 20px;text-align:center;color:#9C8B78;font-size:13px;">
            아직 등록된 콘텐츠가 없습니다.
          </div>`;
        return;
      }

      listEl.innerHTML = recent.map(item => {
        const thumb = images
          .filter(img => img.ContentID === item.ID)
          .sort((a, b) => a.SortOrder - b.SortOrder)[0];

        const status = STATUS_LABEL[item.Status] || STATUS_LABEL.draft;
        const cat    = CAT_NAME[item.CategoryID] || item.CategoryID;
        const date   = item.CreatedAt
          ? new Date(item.CreatedAt).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' })
          : '';

        return `
          <div class="content-item" onclick="location.href='content-edit.html?id=${item.ID}'" style="cursor:pointer;">
            <div class="content-thumb">
              ${thumb
                ? `<img src="${thumb.DriveURL}" alt="${item.Title}">`
                : `<span>${CAT_NAME[item.CategoryID]?.charAt(0) || '📍'}</span>`
              }
            </div>
            <div class="content-info">
              <div class="content-name">${item.Title || '제목 없음'}</div>
              <div class="content-meta">${cat} · ${date}</div>
            </div>
            <span class="badge ${status.cls}">${status.text}</span>
          </div>`;
      }).join('');

    } catch (err) {
      document.getElementById('recentList').innerHTML = `
        <div style="padding:24px 20px;text-align:center;color:#E05C5C;font-size:13px;">
          데이터를 불러오지 못했습니다.<br>
          <small style="color:#9C8B78;">API 연결을 확인해주세요.</small>
        </div>`;
    }
  }

  loadDashboard();
</script>
</body>
</html>
