<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>강진 여행 가이드</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .route-map-wrap{margin:16px 18px;border-radius:14px;overflow:hidden;border:1px solid var(--border);}
  .route-map-canvas{width:100%;height:180px;background:var(--stone);}
  .col-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:4px 18px 20px;}
  .col-grid .place-card .thumb{aspect-ratio:4/3;}
  .col-count-badge{font-size:12px;color:var(--muted);padding:0 18px 12px;}
</style>
</head>
<body>

<div class="app-shell" id="appShell">

  <div class="course-hero" id="courseHero">
    <button class="icon-btn on-photo" style="position:absolute;top:14px;left:14px;z-index:5;" onclick="goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </div>

  <div id="courseBody">
    <div style="padding:60px 24px;text-align:center;color:var(--muted);font-size:13px;">불러오는 중...</div>
  </div>

</div>

<div id="bottomNavRoot"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/util.js"></script>
<script>
renderBottomNav('explore');

function goBack() {
  if (document.referrer && document.referrer.includes(location.host)) history.back();
  else location.href = 'index.html';
}

const id = qs('id');
let categories = [];

async function init() {
  if (!id) { showEmpty(); return; }

  try {
    const catRes = await API.getCategories();
    const d = catRes?.data;
    categories = Array.isArray(d) ? d : (d?.categories || []);
  } catch { categories = []; }

  let res;
  try { res = await API.getCollection(id); } catch (e) { console.error(e); }
  if (!res) { showEmpty(); return; }

  const { meta, hydratedItems, refs } = normalizeCollection(res);
  if (!meta || (!hydratedItems && !refs)) { showEmpty(); return; }

  let items = hydratedItems;
  if (!items) {
    const contentsRes = await API.getContents();
    const norm = normalizeContents(contentsRes);
    const all = attachTags(attachThumbs(norm.contents, norm.images), norm.tags);
    const byId = Object.fromEntries(all.map(c => [c.ID, c]));
    items = refs
      .map(r => ({ ...(byId[r.ContentID] || {}), Note: r.Note, SortOrder: r.SortOrder }))
      .filter(c => c.ID || c.Title);
  }
  items.sort((a, b) => (a.SortOrder || 0) - (b.SortOrder || 0));

  render(meta, items);
}

function showEmpty() {
  document.getElementById('courseBody').innerHTML = `
    <div class="empty-state"><div class="glyph">🗺️</div><p>코스 정보를 찾을 수 없어요.<br>삭제되었거나 잘못된 주소예요.</p></div>`;
}

function render(meta, items) {
  document.title = `${meta.Title || '컬렉션'} — 강진 여행 가이드`;
  const t = CONFIG.COLLECTION_TYPE[meta.Type] || { label: '컬렉션', icon: '📋' };

  document.getElementById('courseHero').innerHTML += `
    ${meta.CoverImage ? `<img src="${meta.CoverImage}" alt="${meta.Title || ''}">` : ''}
    <div class="course-hero-text">
      <span class="course-type-tag">${t.icon} ${t.label}</span>
      <h1>${meta.Title || ''}</h1>
      ${meta.Subtitle ? `<p>${meta.Subtitle}</p>` : ''}
    </div>`;

  const isCourse = meta.Type === 'course';
  const hasCoords = items.some(it => it.Latitude && it.Longitude);

  let html = '';
  if (hasCoords) {
    html += `<div class="route-map-wrap"><div class="route-map-canvas" id="routeMap"></div></div>`;
  }
  html += `<div class="col-count-badge">${isCourse ? '총 ' + items.length + '개 코스' : items.length + '곳'}</div>`;

  if (isCourse) {
    html += `<div class="stop-list">${items.map((it, i) => stopCardHTML(it, i)).join('')}</div>`;
  } else {
    html += `<div class="col-grid">${items.map(placeCardHTML).join('')}</div>`;
  }

  document.getElementById('courseBody').innerHTML = html;

  if (hasCoords) {
    renderMultiMap('routeMap', items, { route: isCourse });
  }
}

function stopCardHTML(it, i) {
  const thumb = firstThumb(it);
  const meta = categoryMeta(it.CategoryID, categories);
  return `
    <div class="stop-card">
      <div class="stop-num-wrap">
        <div class="stop-num">${i + 1}</div>
        <div class="stop-line"></div>
      </div>
      <div class="stop-content" onclick="location.href='detail.html?id=${it.ID}'">
        <div class="thumb">${thumb ? `<img src="${thumb}">` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:20px;">${meta.icon}</div>`}</div>
        <div>
          <div class="name">${it.Title || '제목없음'}</div>
          <div class="note">${it.Note || it.Subtitle || ''}</div>
        </div>
      </div>
    </div>`;
}

function placeCardHTML(c) {
  const thumb = firstThumb(c);
  const meta = categoryMeta(c.CategoryID, categories);
  return `
    <div class="place-card" onclick="location.href='detail.html?id=${c.ID}'">
      <div class="thumb">
        ${thumb ? `<img src="${thumb}" alt="${c.Title || ''}">` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:22px;">${meta.icon}</div>`}
        <div class="heart">${renderHeartBtn(c.ID)}</div>
      </div>
      <div class="name">${c.Title || '제목없음'}</div>
      <div class="cat">${meta.name}</div>
    </div>`;
}

init().catch(err => { console.error(err); showEmpty(); });
</script>
</body>
</html>
