<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>강진 여행 가이드</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .related-scroll{padding:0 18px 4px;}
</style>
</head>
<body>

<div class="app-shell no-nav" id="appShell">

  <div class="carousel" id="carousel">
    <div class="carousel-top">
      <button class="icon-btn on-photo" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    </div>
    <div class="carousel-count" id="carouselCount"></div>
    <div class="carousel-track" id="carouselTrack"></div>
  </div>

  <div id="detailContent">
    <div style="padding:60px 24px;text-align:center;color:var(--muted);font-size:13px;">불러오는 중...</div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/util.js"></script>
<script>
function goBack() {
  if (document.referrer && document.referrer.includes(location.host)) history.back();
  else location.href = 'index.html';
}

const id = qs('id');

async function init() {
  if (!id) { showEmpty(); return; }
  let data;
  try {
    const res = await API.getContent(id);
    data = res?.data;
  } catch (e) { console.error(e); }
  if (!data) { showEmpty(); return; }
  render(data);
}

function showEmpty() {
  document.getElementById('detailContent').innerHTML = `
    <div class="empty-state"><div class="glyph">🍃</div><p>정보를 찾을 수 없어요.<br>삭제되었거나 잘못된 주소예요.</p></div>`;
}

function render(c) {
  document.title = `${c.Title || '강진 여행 가이드'} — 강진 여행 가이드`;

  // 이미지 캐러셀
  const images = (c.images || []).sort((a,b)=>(a.SortOrder||0)-(b.SortOrder||0));
  const track  = document.getElementById('carouselTrack');
  const countEl = document.getElementById('carouselCount');
  if (images.length) {
    track.innerHTML = images.map(img => `<img src="${img.DriveURL}" alt="${img.AltText || c.Title || ''}">`).join('');
    countEl.textContent = `1/${images.length}`;
    if (images.length > 1) {
      track.addEventListener('scroll', () => {
        const idx = Math.round(track.scrollLeft / track.clientWidth);
        countEl.textContent = `${idx + 1}/${images.length}`;
      });
    } else {
      countEl.style.display = 'none';
    }
  } else {
    const meta = categoryMeta(c.CategoryID);
    track.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;background:var(--stone);">${meta.icon}</div>`;
    countEl.style.display = 'none';
  }

  const meta = categoryMeta(c.CategoryID);
  const tags = (c.tags || []).map(t => `<span class="tag-chip">#${t}</span>`).join('');

  const infoRows = [
    c.BusinessHours && infoRow('clock', '영업시간', c.BusinessHours + (c.Holiday ? ` · 휴무 ${c.Holiday}` : '')),
    c.Address       && infoRow('pin',   '주소',     c.Address),
    c.Phone         && infoRow('phone', '전화',     c.Phone),
    c.Parking       && infoRow('car',   '주차',     c.Parking),
    c.Recommended_Time && infoRow('time', '권장 소요시간', c.Recommended_Time),
  ].filter(Boolean).join('');

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-body">
      <div class="detail-cat">${meta.icon} ${meta.name}</div>
      <div class="detail-title">${c.Title || '제목없음'}</div>
      <div class="detail-sub">${c.Subtitle || ''}</div>
      ${tags ? `<div class="tag-chip-row">${tags}</div>` : ''}
      ${c.Description ? `<div class="detail-desc">${escapeHtml(c.Description)}</div>` : ''}
    </div>

    ${infoRows ? `<div class="info-card">${infoRows}</div>` : ''}

    ${c.YoutubeURL ? `
      <div class="section-title-sm">함께 보면 좋은 영상</div>
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/${youtubeId(c.YoutubeURL)}" allowfullscreen></iframe>
      </div>` : ''}

    <div class="section-title-sm">위치</div>
    <div class="map-box"><div class="map-canvas" id="detailMap"></div></div>

    <div class="action-bar">
      <div class="btn btn-outline" id="heartWrap" style="position:relative;"></div>
      <button class="btn btn-outline" onclick="sharePage('${(c.Title||'').replace(/'/g,"")}','${(c.Subtitle||'').replace(/'/g,"")}')">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
      </button>
      <a class="btn btn-primary" href="${kakaoMapLink(c)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        길찾기
      </a>
    </div>`;

  // 액션바용 저장(하트) 버튼 — 사각형 outline 버튼 안에 하트 아이콘만 표시
  const heartWrap = document.getElementById('heartWrap');
  const isSaved = () => Bookmarks.has(c.ID);
  function paintHeart() {
    heartWrap.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke-width:2;${isSaved() ? 'fill:var(--coral);stroke:var(--coral);' : 'fill:none;stroke:var(--text);'}">${heartSvg().match(/<path[^>]*>/)[0]}</svg>`;
  }
  paintHeart();
  heartWrap.onclick = () => { Bookmarks.toggle(c.ID); paintHeart(); showToast(isSaved() ? '저장한 곳에 추가했어요' : '저장을 취소했어요'); };

  renderSingleMap('detailMap', c);
}

function infoRow(icon, label, val) {
  const icons = {
    clock: '<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
    pin  : '<path d="M12 21s7-6.5 7-12a7 7 0 0 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/>',
    phone: '<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .3 2 .6 2.9a2 2 0 0 1-.5 2.1L8 10a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.9.5 2.9.6a2 2 0 0 1 1.7 2z"/>',
    car  : '<path d="M5 17h14M5 17a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm14 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0ZM3 17V9l2-5h14l2 5v8"/>',
    time : '<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
  };
  return `
    <div class="info-row">
      <svg class="ic" viewBox="0 0 24 24">${icons[icon] || icons.pin}</svg>
      <div><div class="label">${label}</div><div class="val">${val}</div></div>
    </div>`;
}

function youtubeId(url) {
  const m = url.match(/(?:youtu\.be\/|v=)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : '';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init().catch(err => { console.error(err); showEmpty(); });
</script>
</body>
</html>
