<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>강진 여행 가이드 — 설렘이 머무는 곳</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .quick-footer{background:var(--green);color:#fff;padding:28px 20px 32px;margin-top:6px;}
  .quick-footer h3{font-size:15px;font-weight:700;margin-bottom:16px;text-align:center;}
  .quick-grid-footer{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .quick-grid-footer a{display:flex;flex-direction:column;align-items:center;gap:6px;color:#fff;}
  .quick-grid-footer .ic{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .quick-grid-footer span{font-size:10.5px;font-weight:500;text-align:center;line-height:1.4;}
</style>
</head>
<body>

<div class="app-shell" id="appShell">

  <div class="brand-row">
    <div>
      <h1 id="siteTitle">강진 여행 가이드</h1>
      <div class="sub" id="siteSubtitle">설렘이 머무는 곳</div>
    </div>
    <div class="brand-actions">
      <button class="icon-btn" onclick="openMoreSheet()" aria-label="메뉴">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="search-bar" onclick="document.getElementById('searchInput').focus()">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
    <input id="searchInput" type="text" placeholder="어디로 떠나볼까요?" />
  </div>

  <div id="heroWrap">
    <div class="hero">
      <div class="hero-text"><p>천천히, 강진을 느껴보세요</p></div>
    </div>
  </div>

  <div class="ridge-divider">
    <svg viewBox="0 0 480 22" preserveAspectRatio="none"><path d="M0 18 Q40 4 80 16 T160 14 T240 18 T320 10 T400 16 T480 12" fill="none" stroke="#2B3D2C" stroke-width="1.4"/></svg>
  </div>

  <div class="category-row" id="categoryRow"></div>

  <div class="section" id="situationSection" style="display:none;">
    <div class="section-head"><h2>상황별 추천</h2><a class="more" href="list.html?view=map">더보기 &rsaquo;</a></div>
    <div class="hscroll" id="situationScroll"></div>
  </div>

  <div class="section" id="editorialSection" style="display:none;">
    <div class="section-head"><h2>오늘의 강진</h2></div>
    <div class="editorial-banner" id="editorialBanner"></div>
  </div>

  <div class="section" id="pickSection" style="display:none;">
    <div class="section-head"><h2>지금 주목받는 곳</h2><a class="more" href="list.html">더보기 &rsaquo;</a></div>
    <div class="grid-cards" id="pickGrid"></div>
  </div>

  <div class="section" id="courseSection" style="display:none;">
    <div class="section-head"><h2>추천 코스</h2></div>
    <div class="hscroll" id="courseScroll"></div>
  </div>

  <div class="quick-footer">
    <h3>강진 여행, 이렇게 즐겨보세요</h3>
    <div class="quick-grid-footer">
      <a href="list.html?view=saved"><span class="ic">🤍</span><span>저장한 곳<br>모아보기</span></a>
      <a href="#" onclick="sharePage('강진 여행 가이드','천천히, 강진을 느껴보세요');return false;"><span class="ic">🔗</span><span>친구에게<br>공유하기</span></a>
      <a href="list.html?view=map"><span class="ic">🗺️</span><span>여행 코스<br>동선 보기</span></a>
      <a href="#" onclick="openMoreSheet();return false;"><span class="ic">💬</span><span>강진 소식<br>보기</span></a>
    </div>
  </div>

</div>

<div id="bottomNavRoot"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/util.js"></script>
<script>
renderBottomNav('home');

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.value.trim()) {
    location.href = `list.html?q=${encodeURIComponent(e.target.value.trim())}`;
  }
});

let categories = [];

async function init() {
  renderSkeletons();

  const [settingsRes, catRes, contentsRes, colRes] = await Promise.allSettled([
    API.getSettings(),
    API.getCategories(),
    API.getContents(),
    API.getCollections(),
  ]);

  // ── 사이트 설정 / 히어로 ──────────────────────
  if (settingsRes.status === 'fulfilled') {
    const s = settingsRes.value?.data || {};
    if (s.site_title)    document.getElementById('siteTitle').textContent = s.site_title;
    if (s.site_subtitle)  document.getElementById('siteSubtitle').textContent = s.site_subtitle;
    const heroText = s.hero_text || '천천히, 강진을 느껴보세요';
    document.getElementById('heroWrap').innerHTML = `
      <div class="hero">
        ${s.hero_image ? `<img src="${s.hero_image}" alt="강진">` : ''}
        <div class="hero-text"><p>${heroText}</p></div>
      </div>`;
  }

  // ── 카테고리 ──────────────────────────────────
  if (catRes.status === 'fulfilled') {
    const d = catRes.value?.data;
    categories = Array.isArray(d) ? d : (d?.categories || []);
  }
  if (!categories.length) {
    categories = Object.entries(CONFIG.CATEGORY_FALLBACK).map(([id, v]) => ({ CategoryID: id, Name: v.name, Icon: v.icon }));
  }
  document.getElementById('categoryRow').innerHTML = categories.map(c => {
    const id = c.CategoryID || c.ID;
    const meta = categoryMeta(id, categories);
    return `
      <button class="category-item" onclick="location.href='list.html?cat=${id}'">
        <div class="category-icon">${meta.icon}</div>
        <span>${meta.name}</span>
      </button>`;
  }).join('');

  // ── 콘텐츠 ────────────────────────────────────
  let contents = [];
  if (contentsRes.status === 'fulfilled') {
    const norm = normalizeContents(contentsRes.value);
    contents = attachTags(attachThumbs(norm.contents, norm.images), norm.tags)
      .filter(c => (c.Status || 'published') === 'published');
  }

  const picks = contents.filter(c => c.Editor_Pick === true || c.Editor_Pick === 'TRUE').slice(0, 6);
  if (picks.length) {
    document.getElementById('pickSection').style.display = '';
    document.getElementById('pickGrid').innerHTML = picks.map(placeCardHTML).join('');
  }

  // ── 컬렉션 (상황별 / 편집장 픽 / 추천코스) ──────
  let collections = [];
  if (colRes.status === 'fulfilled') collections = normalizeCollections(colRes.value);
  collections.sort((a, b) => (a.SortOrder || 0) - (b.SortOrder || 0));

  const situations = collections.filter(c => c.Type === 'situation');
  if (situations.length) {
    document.getElementById('situationSection').style.display = '';
    document.getElementById('situationScroll').innerHTML = situations.map(collectionHCardHTML).join('');
  }

  const editorials = collections.filter(c => c.Type === 'editorial');
  if (editorials.length) {
    const e = editorials[0];
    document.getElementById('editorialSection').style.display = '';
    document.getElementById('editorialBanner').innerHTML = `
      ${e.CoverImage ? `<img src="${e.CoverImage}" alt="${e.Title || ''}">` : ''}
      <span class="editorial-tag">✍️ 편집장 픽</span>
      <div class="editorial-title">${e.Title || ''}</div>`;
    document.getElementById('editorialBanner').onclick = () => location.href = `course.html?id=${e.CollectionID || e.ID}`;
  }

  const courses = collections.filter(c => c.Type === 'course');
  if (courses.length) {
    document.getElementById('courseSection').style.display = '';
    document.getElementById('courseScroll').innerHTML = courses.map(collectionHCardHTML).join('');
  }
}

function placeCardHTML(c) {
  const thumb = firstThumb(c);
  const meta = categoryMeta(c.CategoryID, categories);
  return `
    <div class="place-card" onclick="location.href='detail.html?id=${c.ID}'">
      <div class="thumb">
        ${thumb ? `<img src="${thumb}" alt="${c.Title || ''}">` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:22px;">${meta.icon}</div>`}
        <div class="heart">${renderHeartBtn(c.ID)}</div>
      </div>
      <div class="name">${c.Title || '제목없음'}</div>
      <div class="cat">${meta.name}${c.Address ? ' · ' + truncate(c.Address.split(' ').slice(-1)[0], 8) : ''}</div>
    </div>`;
}

function collectionHCardHTML(col) {
  const t = CONFIG.COLLECTION_TYPE[col.Type] || { icon: '📋' };
  const id = col.CollectionID || col.ID;
  return `
    <div class="hcard" onclick="location.href='course.html?id=${id}'">
      ${col.CoverImage ? `<img src="${col.CoverImage}" alt="${col.Title || ''}">` : ''}
      <div class="hcard-icon">${t.icon}</div>
      <div class="hcard-label">${col.Title || ''}</div>
    </div>`;
}

function renderSkeletons() {
  document.getElementById('categoryRow').innerHTML = Array(5).fill(
    `<div class="category-item"><div class="category-icon skeleton" style="border:none;"></div><span style="visibility:hidden;">-</span></div>`
  ).join('');
}

init().catch(err => {
  console.error(err);
  showToast('일부 정보를 불러오지 못했어요');
});
</script>
</body>
</html>
