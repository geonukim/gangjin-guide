<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컬렉션 관리 — 강진 여행 가이드 관리자</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--green:#2B3D2C;--green-l:#4A6B4C;--green-t:#EBF1E8;--cream:#FAF8F4;--stone:#F0EDE8;--border:#E5DDD5;--text:#1C1814;--muted:#9C8B78;--red:#E05C5C;--radius:10px;}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
  .layout{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--green);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;}
  .sidebar-brand{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.1);}
  .sidebar-brand h1{font-size:14px;font-weight:600;color:#fff;line-height:1.4;}
  .sidebar-brand p{font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px;}
  .sidebar-nav{padding:12px 0;flex:1;}
  .nav-section{padding:8px 20px 4px;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.35);}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;color:rgba(255,255,255,0.75);text-decoration:none;transition:background 0.15s;}
  .nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
  .nav-item.active{background:rgba(255,255,255,0.12);color:#fff;font-weight:500;}
  .nav-item svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  .sidebar-bottom{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1);}
  .btn-logout{width:100%;padding:8px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;font-family:inherit;}
  .btn-logout:hover{background:rgba(255,255,255,0.15);color:#fff;}
  .main{margin-left:220px;flex:1;}
  .topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10;}
  .topbar-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
  .btn{height:34px;padding:0 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:none;display:inline-flex;align-items:center;gap:6px;transition:background 0.15s;text-decoration:none;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover{background:var(--green-l);}
  .btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
  .content{padding:24px 28px;}

  /* 필터 */
  .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .filter-chip{height:32px;padding:0 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;transition:all 0.15s;}
  .filter-chip.active{background:var(--green);color:#fff;border-color:var(--green);}

  /* 카드 그리드 */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

  .col-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow 0.15s,transform 0.15s;}
  .col-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-2px);}

  .col-thumb{height:140px;background:var(--stone);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .col-thumb img{width:100%;height:100%;object-fit:cover;}
  .col-thumb-icon{font-size:36px;opacity:0.5;}
  .col-type-badge{position:absolute;top:10px;left:10px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:500;background:rgba(0,0,0,0.5);color:#fff;}

  .col-body{padding:14px 16px;}
  .col-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-0.2px;}
  .col-subtitle{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:10px;}
  .col-meta{display:flex;align-items:center;justify-content:space-between;}
  .col-count{font-size:11px;color:var(--muted);}
  .badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;}
  .badge-course{background:#EEF2FF;color:#4F46E5;}
  .badge-situation{background:#FEF3E2;color:#D97706;}
  .badge-editorial{background:var(--green-t);color:var(--green-l);}

  .empty{padding:60px 20px;text-align:center;color:var(--muted);}
  .empty p{font-size:14px;margin-bottom:8px;}

  /* 타입 설명 */
  .type-guide{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .type-item{text-align:center;}
  .type-icon{font-size:20px;margin-bottom:4px;}
  .type-name{font-size:12px;font-weight:600;color:var(--text);}
  .type-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4;}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h1>강진 여행 가이드</h1><p>관리자 페이지</p></div>
    <nav class="sidebar-nav">
      <div class="nav-section">메뉴</div>
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>대시보드</a>
      <a href="content-list.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>콘텐츠 관리</a>
      <a href="collection-list.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>컬렉션 관리</a>
      <div class="nav-section" style="margin-top:8px;">설정</div>
      <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>사이트 설정</a>
    </nav>
    <div class="sidebar-bottom"><button class="btn-logout" onclick="Auth.logout()">로그아웃</button></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title">컬렉션 관리</div>
      <a href="collection-edit.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>새 컬렉션 등록
      </a>
    </div>

    <div class="content">
      <!-- 타입 안내 -->
      <div class="type-guide">
        <div class="type-item">
          <div class="type-icon">🗺️</div>
          <div class="type-name">추천코스</div>
          <div class="type-desc">장소들을 순서대로 엮은 동선 가이드</div>
        </div>
        <div class="type-item">
          <div class="type-icon">⭐</div>
          <div class="type-name">상황별 추천</div>
          <div class="type-desc">늦게까지·비오는날 등 상황 맞춤 묶음</div>
        </div>
        <div class="type-item">
          <div class="type-icon">✍️</div>
          <div class="type-name">편집장 픽</div>
          <div class="type-desc">관리자가 직접 선정한 추천 장소 묶음</div>
        </div>
      </div>

      <!-- 필터 -->
      <div class="filter-bar">
        <button class="filter-chip active" onclick="setFilter('')">전체</button>
        <button class="filter-chip" onclick="setFilter('course')">🗺️ 추천코스</button>
        <button class="filter-chip" onclick="setFilter('situation')">⭐ 상황별 추천</button>
        <button class="filter-chip" onclick="setFilter('editorial')">✍️ 편집장 픽</button>
      </div>

      <div class="card-grid" id="cardGrid">
        <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted);">불러오는 중...</div>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
Auth.require();

const TYPE = {
  course    : { label:'추천코스',    cls:'badge-course',    icon:'🗺️' },
  situation : { label:'상황별 추천', cls:'badge-situation', icon:'⭐' },
  editorial : { label:'편집장 픽',   cls:'badge-editorial', icon:'✍️' },
};

let allCols  = [];
let curFilter = '';

async function load() {
  try {
    const res = await API.getCollections();
    allCols   = res.data || [];
    render();
  } catch(e) {
    document.getElementById('cardGrid').innerHTML =
      `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted);">데이터를 불러오지 못했습니다.</div>`;
  }
}

function setFilter(type) {
  curFilter = type;
  document.querySelectorAll('.filter-chip').forEach((el,i) => {
    const types = ['','course','situation','editorial'];
    el.classList.toggle('active', types[i] === type);
  });
  render();
}

function render() {
  const rows = curFilter ? allCols.filter(c => c.Type === curFilter) : allCols;

  if (!rows.length) {
    document.getElementById('cardGrid').innerHTML =
      `<div style="grid-column:1/-1;" class="empty"><p>등록된 컬렉션이 없습니다.</p></div>`;
    return;
  }

  document.getElementById('cardGrid').innerHTML = rows.map(col => {
    const t = TYPE[col.Type] || { label: col.Type, cls:'badge-course', icon:'📋' };
    return `
      <div class="col-card" onclick="location.href='collection-edit.html?id=${col.CollectionID}'">
        <div class="col-thumb">
          ${col.CoverImage
            ? `<img src="${col.CoverImage}" alt="${col.Title}">`
            : `<div class="col-thumb-icon">${t.icon}</div>`
          }
          <span class="col-type-badge">${t.label}</span>
        </div>
        <div class="col-body">
          <div class="col-title">${col.Title || '제목 없음'}</div>
          <div class="col-subtitle">${col.Subtitle || ''}</div>
          <div class="col-meta">
            <span class="col-count">순서 ${col.SortOrder || '-'}</span>
            <span class="badge ${t.cls}">${t.label}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
