<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컬렉션 등록/수정 — 강진 여행 가이드 관리자</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--green:#2B3D2C;--green-l:#4A6B4C;--green-t:#EBF1E8;--cream:#FAF8F4;--stone:#F0EDE8;--border:#E5DDD5;--text:#1C1814;--muted:#9C8B78;--red:#E05C5C;--radius:10px;}
  body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
  .layout{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--green);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;}
  .sidebar-brand{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.1);}
  .sidebar-brand h1{font-size:14px;font-weight:600;color:#fff;line-height:1.4;}
  .sidebar-brand p{font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px;}
  .sidebar-nav{padding:12px 0;flex:1;}
  .nav-section{padding:8px 20px 4px;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.35);}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;color:rgba(255,255,255,0.75);text-decoration:none;transition:background 0.15s;}
  .nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
  .nav-item.active{background:rgba(255,255,255,0.12);color:#fff;font-weight:500;}
  .nav-item svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  .sidebar-bottom{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1);}
  .btn-logout{width:100%;padding:8px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;font-family:inherit;}
  .main{margin-left:220px;flex:1;}
  .topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10;}
  .topbar-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
  .topbar-actions{display:flex;gap:8px;}
  .btn{height:34px;padding:0 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:none;display:inline-flex;align-items:center;gap:6px;transition:background 0.15s;text-decoration:none;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover{background:var(--green-l);}
  .btn-secondary{background:var(--stone);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}
  .btn-danger{background:#FEE2E2;color:var(--red);}
  .btn-danger:hover{background:#FECACA;}
  .btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
  .content{padding:28px;max-width:900px;}
  .form-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start;}
  .form-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
  .form-card-header{padding:14px 20px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;}
  .form-card-body{padding:20px;}
  .field{margin-bottom:16px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;}
  .field label .req{color:var(--red);margin-left:2px;}
  .input,.textarea,.select{width:100%;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--cream);outline:none;font-family:inherit;transition:border-color 0.15s,background 0.15s;}
  .input{height:40px;padding:0 12px;}
  .textarea{padding:10px 12px;resize:vertical;min-height:80px;line-height:1.6;}
  .select{height:40px;padding:0 12px;cursor:pointer;}
  .input:focus,.textarea:focus,.select:focus{border-color:var(--green);background:#fff;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  /* 장소 추가 */
  .place-search-wrap{display:flex;gap:8px;margin-bottom:12px;}
  .place-search-wrap .input{flex:1;}

  .search-results{background:#fff;border:1px solid var(--border);border-radius:var(--radius);max-height:200px;overflow-y:auto;margin-top:-8px;margin-bottom:12px;display:none;}
  .search-result-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;transition:background 0.1s;}
  .search-result-item:last-child{border-bottom:none;}
  .search-result-item:hover{background:var(--cream);}
  .search-result-item strong{display:block;color:var(--text);}
  .search-result-item span{font-size:11px;color:var(--muted);}

  /* 코스 아이템 */
  .course-items{display:flex;flex-direction:column;gap:8px;}
  .course-item{background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
  .course-item-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .course-item-num{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .course-item-name{flex:1;font-size:13px;font-weight:500;color:var(--text);}
  .course-item-cat{font-size:10px;color:var(--muted);}
  .course-item-del{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px;display:flex;align-items:center;}
  .course-item-del:hover{color:var(--red);}
  .course-item-del svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
  .course-item-comment .input{font-size:12px;height:34px;}

  .move-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
  .move-btn{width:22px;height:22px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);}
  .move-btn:hover{background:var(--stone);}

  .empty-items{padding:24px;text-align:center;color:var(--muted);font-size:13px;border:2px dashed var(--border);border-radius:10px;}

  /* 토스트 & 모달 */
  .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.12);transform:translateY(80px);opacity:0;transition:transform 0.3s,opacity 0.3s;z-index:999;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.success{background:var(--green);color:#fff;}
  .toast.error{background:var(--red);color:#fff;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:100;}
  .modal-overlay.show{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:28px;max-width:360px;width:90%;}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:8px;}
  .modal p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h1>강진 여행 가이드</h1><p>관리자 페이지</p></div>
    <nav class="sidebar-nav">
      <div class="nav-section">메뉴</div>
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>대시보드</a>
      <a href="content-list.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>콘텐츠 관리</a>
      <a href="collection-list.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>컬렉션 관리</a>
      <div class="nav-section" style="margin-top:8px;">설정</div>
      <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>사이트 설정</a>
    </nav>
    <div class="sidebar-bottom"><button class="btn-logout" onclick="Auth.logout()">로그아웃</button></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">컬렉션 등록</div>
      <div class="topbar-actions">
        <button class="btn btn-danger" id="btnDelete" style="display:none;" onclick="confirmDelete()">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>삭제
        </button>
        <a href="collection-list.html" class="btn btn-secondary">취소</a>
        <button class="btn btn-primary" onclick="saveCollection()">
          <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>저장
        </button>
      </div>
    </div>

    <div class="content">
      <div class="form-grid">
        <!-- 왼쪽 -->
        <div>
          <!-- 기본 정보 -->
          <div class="form-card">
            <div class="form-card-header">기본 정보</div>
            <div class="form-card-body">
              <div class="field">
                <label>컬렉션 유형 <span class="req">*</span></label>
                <select class="select" id="colType">
                  <option value="">선택하세요</option>
                  <option value="course">🗺️ 추천코스 — 장소를 순서대로 엮은 동선</option>
                  <option value="situation">⭐ 상황별 추천 — 늦게까지·비오는날 등</option>
                  <option value="editorial">✍️ 편집장 픽 — 관리자 추천 장소 묶음</option>
                </select>
              </div>
              <div class="field">
                <label>제목 <span class="req">*</span></label>
                <input type="text" class="input" id="colTitle" placeholder="예) 강진 저녁 힐링 코스">
              </div>
              <div class="field">
                <label>부제목</label>
                <input type="text" class="input" id="colSubtitle" placeholder="예) 오후 4시부터 저녁까지 3시간 코스">
              </div>
              <div class="field-row">
                <div class="field">
                  <label>표시 순서</label>
                  <input type="number" class="input" id="colSortOrder" placeholder="1" min="1">
                </div>
              </div>
              <div class="field">
                <label>커버 이미지 URL</label>
                <input type="text" class="input" id="colCoverImage" placeholder="Google Drive 공개 URL">
              </div>
              <div class="field">
                <label>유튜브 URL (선택)</label>
                <input type="text" class="input" id="colYoutube" placeholder="https://youtu.be/...">
              </div>
            </div>
          </div>

          <!-- 구성 장소 -->
          <div class="form-card">
            <div class="form-card-header">
              구성 장소
              <span style="font-weight:400;color:var(--muted);font-size:11px;"> · 등록된 콘텐츠에서 검색하여 추가</span>
            </div>
            <div class="form-card-body">
              <!-- 검색 -->
              <div class="place-search-wrap">
                <input type="text" class="input" id="placeSearch" placeholder="장소명 검색..." oninput="searchPlace(this.value)">
                <button class="btn btn-secondary" onclick="clearSearch()">닫기</button>
              </div>
              <div class="search-results" id="searchResults"></div>

              <!-- 추가된 장소 목록 -->
              <div class="course-items" id="courseItems">
                <div class="empty-items">장소를 검색하여 추가해주세요</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 오른쪽 -->
        <div>
          <div class="form-card">
            <div class="form-card-header">사용 안내</div>
            <div class="form-card-body">
              <p style="font-size:12px;color:var(--muted);line-height:1.8;">
                <strong style="color:var(--text);">추천코스</strong><br>
                장소를 순서대로 추가하고, 각 장소마다 안내 메모를 입력하세요.<br><br>
                <strong style="color:var(--text);">상황별 추천</strong><br>
                "늦게까지", "비오는 날" 등 상황에 맞는 장소들을 묶어주세요.<br><br>
                <strong style="color:var(--text);">편집장 픽</strong><br>
                직접 가보고 추천하는 장소들을 선정해주세요.
              </p>
            </div>
          </div>

          <div class="form-card">
            <div class="form-card-header">구성 장소 수</div>
            <div class="form-card-body" style="text-align:center;">
              <div style="font-size:36px;font-weight:700;color:var(--green);" id="itemCount">0</div>
              <div style="font-size:12px;color:var(--muted);margin-top:4px;">개 장소</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 삭제 모달 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>컬렉션 삭제</h3>
    <p>이 컬렉션을 삭제하시겠습니까?<br>구성 장소 매핑도 함께 삭제됩니다.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-danger" onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
Auth.require();

const CAT = { cat_001:'🍽️ 식당', cat_002:'☕ 카페', cat_003:'🌿 여행지' };

let editId     = null;
let items      = []; // {contentId, name, category, courseComment}
let allContents = [];

// ── 초기화 ──────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(location.search);
  editId       = params.get('id');

  // 콘텐츠 목록 로드 (장소 검색용)
  try {
    const res   = await API.adminGetAll();
    allContents = (res.data?.contents || []).filter(c => c.Status === 'published');
  } catch(e) {}

  if (editId) {
    document.getElementById('pageTitle').textContent = '컬렉션 수정';
    document.getElementById('btnDelete').style.display = 'flex';
    await loadCollection(editId);
  }
});

// ── 불러오기 ────────────────────────────────
async function loadCollection(id) {
  try {
    const res = await API.getCollection(id);
    const d   = res.data;
    document.getElementById('colType').value       = d.Type        || '';
    document.getElementById('colTitle').value      = d.Title       || '';
    document.getElementById('colSubtitle').value   = d.Subtitle    || '';
    document.getElementById('colSortOrder').value  = d.SortOrder   || '';
    document.getElementById('colCoverImage').value = d.CoverImage  || '';
    document.getElementById('colYoutube').value    = d.YoutubeURL  || '';

    items = (d.items || []).map(item => ({
      contentId    : item.ID,
      name         : item.Title,
      category     : item.CategoryID,
      courseComment: item.courseComment || '',
    }));
    renderItems();
  } catch(e) { showToast('불러오지 못했습니다.', 'error'); }
}

// ── 저장 ────────────────────────────────────
async function saveCollection() {
  const type  = document.getElementById('colType').value;
  const title = document.getElementById('colTitle').value.trim();
  if (!type)  { showToast('컬렉션 유형을 선택해주세요.', 'error'); return; }
  if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }

  const data = {
    Type       : type,
    Title      : title,
    Subtitle   : document.getElementById('colSubtitle').value.trim(),
    SortOrder  : document.getElementById('colSortOrder').value || 1,
    CoverImage : document.getElementById('colCoverImage').value.trim(),
    YoutubeURL : document.getElementById('colYoutube').value.trim(),
    items      : items.map((item, i) => ({
      contentId    : item.contentId,
      sequence     : i + 1,
      courseComment: item.courseComment,
    })),
  };

  try {
    if (editId) {
      await API.updateCollection(editId, data);
    } else {
      await API.createCollection(data);
    }
    showToast(editId ? '수정되었습니다.' : '등록되었습니다.', 'success');
    setTimeout(() => { location.href = 'collection-list.html'; }, 900);
  } catch(e) { showToast('저장에 실패했습니다.', 'error'); }
}

// ── 삭제 ────────────────────────────────────
function confirmDelete() { document.getElementById('deleteModal').classList.add('show'); }
function closeModal()    { document.getElementById('deleteModal').classList.remove('show'); }
async function doDelete() {
  try {
    await API.deleteCollection(editId);
    showToast('삭제되었습니다.', 'success');
    setTimeout(() => { location.href = 'collection-list.html'; }, 800);
  } catch(e) { showToast('삭제에 실패했습니다.', 'error'); closeModal(); }
}

// ── 장소 검색 ────────────────────────────────
let searchTimer = null;
function searchPlace(q) {
  clearTimeout(searchTimer);
  const box = document.getElementById('searchResults');
  if (!q.trim()) { box.style.display = 'none'; return; }

  searchTimer = setTimeout(() => {
    const results = allContents
      .filter(c => (c.Title||'').includes(q) || (c.Subtitle||'').includes(q))
      .filter(c => !items.find(i => i.contentId === c.ID))
      .slice(0, 8);

    if (!results.length) {
      box.innerHTML = `<div class="search-result-item"><strong>검색 결과 없음</strong></div>`;
    } else {
      box.innerHTML = results.map(c => `
        <div class="search-result-item" onclick="addItem('${c.ID}','${(c.Title||'').replace(/'/g,"\\'")}','${c.CategoryID}')">
          <strong>${c.Title || '제목없음'}</strong>
          <span>${CAT[c.CategoryID] || ''} · ${c.Address || ''}</span>
        </div>`).join('');
    }
    box.style.display = 'block';
  }, 200);
}

function clearSearch() {
  document.getElementById('placeSearch').value = '';
  document.getElementById('searchResults').style.display = 'none';
}

function addItem(contentId, name, category) {
  if (items.find(i => i.contentId === contentId)) {
    showToast('이미 추가된 장소입니다.', 'error'); return;
  }
  items.push({ contentId, name, category, courseComment: '' });
  renderItems();
  clearSearch();
}

function removeItem(idx) {
  items.splice(idx, 1);
  renderItems();
}

function moveItem(idx, dir) {
  const target = idx + dir;
  if (target < 0 || target >= items.length) return;
  [items[idx], items[target]] = [items[target], items[idx]];
  renderItems();
}

function updateComment(idx, val) {
  items[idx].courseComment = val;
}

function renderItems() {
  document.getElementById('itemCount').textContent = items.length;
  const el = document.getElementById('courseItems');

  if (!items.length) {
    el.innerHTML = '<div class="empty-items">장소를 검색하여 추가해주세요</div>';
    return;
  }

  el.innerHTML = items.map((item, i) => `
    <div class="course-item">
      <div class="course-item-header">
        <div class="move-btns">
          <button class="move-btn" onclick="moveItem(${i},-1)" ${i===0?'disabled':''}>▲</button>
          <button class="move-btn" onclick="moveItem(${i},1)"  ${i===items.length-1?'disabled':''}>▼</button>
        </div>
        <div class="course-item-num">${i+1}</div>
        <div style="flex:1;">
          <div class="course-item-name">${item.name}</div>
          <div class="course-item-cat">${CAT[item.category]||''}</div>
        </div>
        <button class="course-item-del" onclick="removeItem(${i})">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="course-item-comment">
        <input type="text" class="input" placeholder="이 장소에 대한 안내 메모 (선택)" value="${item.courseComment||''}" oninput="updateComment(${i},this.value)">
      </div>
    </div>`).join('');
}

// ── 유틸 ────────────────────────────────────
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type}`;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
